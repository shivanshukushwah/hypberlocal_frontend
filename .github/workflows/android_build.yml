name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: |
        rm -f package-lock.json
        npm install

    - name: Build Web Assets
      run: |
        CI=false npm run build
        echo "Checking dist folder structure..."
        ls -R dist/ || (echo "dist folder missing or empty!" && exit 1)

    - name: Sync Capacitor
      run: |
        npx cap doctor > cap-doctor.log 2>&1 || true
        npx cap update android > cap-update.log 2>&1 || true
        npx cap sync android --verbose > cap-sync.log 2>&1

    - name: Build with Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --debug --stacktrace > gradle-build.log 2>&1

    - name: Upload Workspace on Failure
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: workspace-diagnostics
        path: |
          dist/
          android/app/build/reports/
          *.log
          package.json
          capacitor.config.json

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
