name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Audit Environment
      run: |
        echo "Node version: $(node -v)"
        echo "NPM version: $(npm -v)"
        echo "Current Workdir: $(pwd)"
        ls -la
        cat package.json

    - name: Install dependencies
      run: |
        npm cache clean --force
        npm install --legacy-peer-deps

    - name: Build Web Assets
      run: |
        CI=false npm run build
        mkdir -p dist
        touch dist/index.html
        echo "Checking dist folder structure..."
        ls -la dist/

    - name: Clean and Add Android Platform
      run: |
        rm -rf android
        npx cap add android
        # Restore stable versions
        echo "ext {
            minSdkVersion = 22
            compileSdkVersion = 34
            targetSdkVersion = 34
            androidxActivityVersion = '1.9.1'
            androidxAppCompatVersion = '1.7.0'
            androidxCoordinatorLayoutVersion = '1.2.0'
            androidxCoreVersion = '1.13.1'
            androidxFragmentVersion = '1.8.2'
            junitVersion = '4.13.2'
            androidxJunitVersion = '1.2.1'
            androidxEspressoCoreVersion = '3.6.1'
            cordovaAndroidVersion = '10.1.1'
        }" > android/variables.gradle
        # Restore missing resources
        mkdir -p android/app/src/main/res/values
        echo "<?xml version='1.0' encoding='utf-8'?>
        <resources>
            <color name='colorPrimary'>#6200EE</color>
            <color name='colorPrimaryDark'>#3700B3</color>
            <color name='colorAccent'>#03DAC5</color>
        </resources>" > android/app/src/main/res/values/colors.xml
        npx cap sync android --verbose

    - name: Build with Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --debug --stacktrace

    - name: Upload Workspace on Failure
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: workspace-diagnostics
        path: |
          dist/
          android/app/build/reports/
          *.log
          package.json
          capacitor.config.json

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
